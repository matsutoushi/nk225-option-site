name: daily-update

on:
  schedule:
    # JPXの公表(夕方)を追いかけて平日4回チェック(JST: 16:35 / 17:05 / 18:05 / 20:30)
    # 新しいデータが出た回だけビルド&デプロイし、未更新ならスキップする
    - cron: "35 7 * * 1-5"
    - cron: "5 8 * * 1-5"
    - cron: "5 9 * * 1-5"
    - cron: "30 11 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 手動実行・コード変更時は未更新でも必ずビルドする
      FORCE_BUILD: ${{ github.event_name != 'schedule' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-ipaexfont

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build site
        id: build
        shell: bash
        run: |
          set -o pipefail
          python pipeline/build.py 2>&1 | tee build.log
          if [ -f site/index.html ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No new JPX data yet - skipping deploy."
          fi

      - name: Save error log for diagnosis
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f build.log
          git commit -m "ci: build error log"
          git push

      - name: Commit data history
        if: steps.build.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: daily update"
          git push

      - name: Email post draft
        if: steps.build.outputs.updated == 'true' && env.MAIL_APP_PASSWORD != ''
        env:
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "【X投稿ネタ】日経225オプションデータ更新"
          to: ${{ secrets.MAIL_USERNAME }}
          from: nk225-option-site
          body: file://site/post.txt

      - name: Upload artifact
        if: steps.build.outputs.updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.build.outputs.updated == 'true'
        uses: actions/deploy-pages@v4
