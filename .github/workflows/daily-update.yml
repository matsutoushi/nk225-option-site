name: daily-update

on:
  schedule:
    # 平日 20:30 JST (= 11:30 UTC)。JPXの日次データ公表後に実行
    - cron: "30 11 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-ipaexfont

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build site
        shell: bash
        run: |
          set -o pipefail
          python pipeline/build.py 2>&1 | tee build.log

      - name: Save error log for diagnosis
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f build.log
          git commit -m "ci: build error log"
          git push

      - name: Commit data history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: daily update"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
